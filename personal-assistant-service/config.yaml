# Personal Assistant — LLM Provider 配置
# 详见 ADR-011: 多 LLM Provider 可配置架构
llm:
  default: deepseek  # 默认 provider。可选值：deepseek
  providers:
    deepseek:
      base_url: https://api.deepseek.com
      credential_provider_name: DEEPSEEK_API_KEY
      model: deepseek-v4-pro

identity:
  gitee:
    provider_name: gitee-provider
  iam_users_readonly:
    provider_name: iam-users-readonly
    agency_session_name: personal-assistant-iam-users-readonly
    region: cn-southwest-2
    endpoint: https://iam.cn-southwest-2.myhuaweicloud.com
