default_agent: personal-assistant
agents:
  personal-assistant:
    base:
      name: personal-assistant
      entrypoint: agent:app
      dependency_file: pyproject.toml
      region: cn-southwest-2
      platform: linux/arm64
      language: python3
      base_image: ghcr.io/astral-sh/uv:python3.12-bookworm
      container_runtime: docker
    swr_config:
      organization_auto_create: true
      organization: personal-assistant-org
      repository_auto_create: true
      repository: agent_personal_assistant
    runtime:
      arch: arm64
      agent_gateway_id: null
      agent_id: 24556b84-099e-4ba6-af90-bf7daded6679
      execution_agency_name: DefaultAgentArtsRuntimeAgency
      invoke_config:
        protocol: HTTP
        port: 8080
        file_transfer_config: null
        url_match_type: PREFIX_MATCH
      network_config:
        network_mode: PUBLIC
        vpc_config: null
      identity_configuration:
        authorizer_type: CUSTOM_JWT
        authorizer_configuration:
          custom_jwt:
            discovery_url: https://login.microsoftonline.com/2a1d3739-88c5-4314-b921-acbeac0abbfa/v2.0/.well-known/openid-configuration
            allowed_audience:
            - 3a99a511-926c-475c-b6bc-325a037f574d
            allowed_clients: []
            allowed_scopes: []
          key_auth:
            api_keys:
            - api_key: pa-dev-api-key-2026
              api_key_name: dev-key
      observability:
        tracing:
          enabled: true
        metrics:
          enabled: true
        logs:
          enabled: true
      artifact_source:
        url: ${AGENTARTS_IMAGE_URL}
        commands: []
      environment_variables:
      - key: LOG_LEVEL
        value: ${LOG_LEVEL}
      - key: LLM_PROVIDER
        value: ${LLM_PROVIDER}
      - key: LLM_MODEL
        value: ${LLM_MODEL}
      - key: LLM_CREDENTIAL_PROVIDER
        value: ${LLM_CREDENTIAL_PROVIDER}
      - key: POSTGRES_DSN
        value: ${POSTGRES_DSN}
      - key: OAUTH2_CALENDAR_CALLBACK_URL
        value: ${OAUTH2_CALENDAR_CALLBACK_URL}
      tags:
      - key: app
        value: personal-assistant
      - key: env
        value: dev
