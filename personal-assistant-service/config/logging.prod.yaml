version: 1
disable_existing_loggers: false

formatters:
  json:
    "()": app.logging_config.JsonFormatter
    environment: production

filters:
  runtime_level:
    "()": app.logging_config.RuntimeLevelFilter
  context:
    "()": app.logging_config.ContextFilter

handlers:
  stdout:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: json
    filters: [runtime_level, context]

loggers:
  app:
    handlers: [stdout]
    level: DEBUG
    propagate: false
  uvicorn:
    handlers: [stdout]
    level: DEBUG
    propagate: false
  uvicorn.error:
    level: DEBUG
  uvicorn.access:
    handlers: []
    level: CRITICAL
    propagate: false

root:
  handlers: [stdout]
  level: DEBUG
