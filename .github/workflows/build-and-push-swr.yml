name: Build and Push to SWR

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm  # GitHub 原生 ARM64 runner，无需 QEMU 模拟

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SWR login password
        run: |
          SWR_PASSWORD=$(printf "${{ secrets.HUAWEICLOUD_SDK_AK }}" | openssl dgst -binary -sha256 -hmac "${{ secrets.HUAWEICLOUD_SDK_SK }}" | od -An -vtx1 | tr -d ' \n')
          echo "SWR_PASSWORD=$SWR_PASSWORD" >> $GITHUB_ENV

      - name: Login to SWR
        run: |
          echo "$SWR_PASSWORD" | docker login swr.cn-southwest-2.myhuaweicloud.com \
            -u "cn-southwest-2@${{ secrets.HUAWEICLOUD_SDK_AK }}" \
            --password-stdin

      - name: Build and push ARM64 image
        env:
          BUILDKIT_USE_OCI_MEDIA_TYPES: "0"  # SWR 不支持 OCI 格式，Docker 27+ 必需
        run: |
          docker build \
            --platform linux/arm64 \
            -f personal-assistant-service/Dockerfile \
            -t swr.cn-southwest-2.myhuaweicloud.com/personal-assistant-org/agent_personal_assistant:latest \
            .

          docker push swr.cn-southwest-2.myhuaweicloud.com/personal-assistant-org/agent_personal_assistant:latest

      - name: Verify image pushed
        run: |
          echo "✅ Image pushed: swr.cn-southwest-2.myhuaweicloud.com/personal-assistant-org/agent_personal_assistant:latest"
          docker images | grep agent_personal_assistant || true
