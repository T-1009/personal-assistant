name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - "personal-assistant-infra/**"
      - ".github/workflows/deploy-infra.yml"
  push:
    branches: [main]
    paths:
      - "personal-assistant-infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

jobs:
  tofu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~> 1.9"

      - name: tofu init
        working-directory: personal-assistant-infra
        run: tofu init

      - name: tofu validate
        working-directory: personal-assistant-infra
        run: tofu validate

      - name: tofu fmt check
        working-directory: personal-assistant-infra
        run: tofu fmt -check -recursive

      - name: Import existing DNS zone
        working-directory: personal-assistant-infra
        env:
          HW_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          HW_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
        run: tofu import huaweicloud_dns_zone.main ff8080829e039233019eac11e92057f8

      - name: tofu plan
        working-directory: personal-assistant-infra
        env:
          HW_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          HW_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
          TF_VAR_region: "cn-southwest-2"
        run: tofu plan -input=false

      - name: tofu apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: personal-assistant-infra
        env:
          HW_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          HW_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
          TF_VAR_region: "cn-southwest-2"
        run: tofu apply -auto-approve -input=false
